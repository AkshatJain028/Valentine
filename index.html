<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Valentine's Day ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background: linear-gradient(#ffd6e7, #ffb6d9);
  overflow-x: hidden;
  position: relative;
}

/* Floating hearts */
body::before {
  content: "❤️ 💕 💗 💖 💞 💘";
  position: fixed;
  width: 100%;
  top: 0;
  left: 0;
  font-size: 40px;
  opacity: 0.08;
  animation: floatHearts 25s linear infinite;
  white-space: nowrap;
}

@keyframes floatHearts {
  from { transform: translateY(-100%); }
  to { transform: translateY(100vh); }
}

h1 {
  font-family: 'Pacifico', cursive;
  font-size: 48px;
  color: #d63384;
  margin-top: 30px;
}

.subtitle {
  font-size: 20px;
  margin-bottom: 10px;
  color: #a61e4d;
}

.status {
  font-weight: 600;
  color: #ff4d6d;
  font-size: 22px;
  margin-bottom: 15px;
}

.puzzle-container {
  margin: 20px auto;
  width: 360px;
  height: 360px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  position: relative;
}

.puzzle-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.love-text {
  font-family: 'Pacifico', cursive;
  font-size: 38px;
  color: #ff4d6d;
  margin-top: 20px;
}

.small-text {
  color: #a61e4d;
  margin-bottom: 20px;
}

button {
  background: linear-gradient(45deg, #ff4d6d, #ff85a2);
  border: none;
  padding: 12px 28px;
  border-radius: 30px;
  font-size: 18px;
  color: white;
  cursor: pointer;
  margin-bottom: 25px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
}

.bottom-section {
  background: linear-gradient(#ff9ec4, #ff85a2);
  padding: 40px 20px;
  color: white;
  font-family: 'Pacifico', cursive;
  font-size: 30px;
}

.bottom-section p {
  font-family: 'Poppins', sans-serif;
  font-size: 18px;
  margin-top: 10px;
}

/* Cute cat decorations */
.cat-top {
  font-size: 30px;
  margin-bottom: -10px;
}

.cat-bottom {
  font-size: 40px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="cat-top">🐱 🐾 🐱</div>

<h1>Happy Valentine's Day</h1>
<div class="subtitle">Welcome to Our Love Story!</div>
<div class="status">Puzzle Complete!</div>

<div class="puzzle-container">
  <img src="your-image.jpg" alt="Our Picture">
</div>

<div class="love-text">You Complete Me! ❤️</div>
<div class="small-text">Our Sweet Jigsaw Moment</div>

<button onclick="shuffle()">Shuffle Puzzle</button>

<div class="bottom-section">
  <div class="cat-bottom">🐰 🐾 🐱</div>
  Forever & Always 💖
  <p>With You, My Heart is Home</p>
</div>

<script>
function shuffle() {
  alert("Puzzle Shuffled Again! ❤️");
}
</script>

</body>
</html>
