<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Puzzle</title>
<style>
body {
    background: #ffd1dc;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    min-height: 100vh;
    margin: 0;
    text-align: center;
}
.container {
    max-width: 90%;
    margin-top: 20px;
}
h1 { color: #d32f2f; font-size: 2rem; margin: 0; }
h3 { color: #880e4f; margin: 5px 0 15px; }
#puzzle {
    position: relative;
    margin: 0 auto;
    background: #fff;
    border-radius: 10px;
    touch-action: none;
}
.piece {
    position: absolute;
    cursor: grab;
    border: 2px solid #fff;
    box-sizing: border-box;
    background-size: cover;
}
.button {
    margin-top: 15px;
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    background: #f06292;
    color: #fff;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
<h1>Happy Valentine's Day</h1>
<h3>Welcome to Our Love Story!</h3>
<div id="puzzle"></div>
<button id="shuffleBtn" class="button">Shuffle Puzzle</button>
</div>

<script>
// Settings
const rows = 4;
const cols = 5;
const imgSrc = 'puzzle.jpg'; // Your uploaded image
let pieces = [];
const puzzleContainer = document.getElementById('puzzle');

const img = new Image();
img.src = imgSrc;
img.onload = () => {
    // Scale image to fit screen width
    const maxWidth = Math.min(img.width, window.innerWidth * 0.9);
    const scale = maxWidth / img.width;
    const puzzleWidth = img.width * scale;
    const puzzleHeight = img.height * scale;
    puzzleContainer.style.width = puzzleWidth + 'px';
    puzzleContainer.style.height = puzzleHeight + 'px';

    const pieceWidth = puzzleWidth / cols;
    const pieceHeight = puzzleHeight / rows;

    // Create pieces
    pieces = [];
    for (let y=0; y<rows; y++){
        for (let x=0; x<cols; x++){
            const piece = {
                correctX: x*pieceWidth,
                correctY: y*pieceHeight,
                x: x*pieceWidth,
                y: y*pieceHeight,
                element: null,
                width: pieceWidth,
                height: pieceHeight
            };
            pieces.push(piece);
        }
    }

    drawPuzzle();
};

function drawPuzzle(){
    puzzleContainer.innerHTML = '';
    pieces.forEach(piece => {
        const div = document.createElement('div');
        div.classList.add('piece');
        div.style.width = piece.width+'px';
        div.style.height = piece.height+'px';
        div.style.left = piece.x+'px';
        div.style.top = piece.y+'px';
        div.style.backgroundImage = `url(${imgSrc})`;
        div.style.backgroundSize = `${puzzleContainer.offsetWidth}px ${puzzleContainer.offsetHeight}px`;
        div.style.backgroundPosition = `-${piece.correctX}px -${piece.correctY}px`;
        puzzleContainer.appendChild(div);
        piece.element = div;
        makeDraggable(div, piece);
    });
}

function shufflePuzzle(){
    pieces.forEach(piece=>{
        piece.x = Math.random()*(puzzleContainer.offsetWidth-piece.width);
        piece.y = Math.random()*(puzzleContainer.offsetHeight-piece.height);
        piece.element.style.left = piece.x+'px';
        piece.element.style.top = piece.y+'px';
    });
}
document.getElementById('shuffleBtn').addEventListener('click', shufflePuzzle);

function makeDraggable(el, piece){
    let offsetX, offsetY, dragging=false;
    const start = e=>{
        dragging=true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        offsetX = clientX - el.offsetLeft;
        offsetY = clientY - el.offsetTop;
        el.style.zIndex = 1000;
    };
    const move = e=>{
        if(!dragging) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        piece.x = clientX - offsetX;
        piece.y = clientY - offsetY;
        el.style.left = piece.x+'px';
        el.style.top = piece.y+'px';
    };
    const end = ()=>{
        dragging=false;
        el.style.zIndex = 1;
        // Snap to correct position if close
        if(Math.abs(piece.x-piece.correctX)<20 && Math.abs(piece.y-piece.correctY)<20){
            piece.x = piece.correctX;
            piece.y = piece.correctY;
            el.style.left = piece.x+'px';
            el.style.top = piece.y+'px';
        }
        checkWin();
    };
    el.addEventListener('mousedown', start);
    el.addEventListener('touchstart', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move);
    window.addEventListener('mouseup', end);
    window.addEventListener('touchend', end);
}

function checkWin(){
    if(pieces.every(p=>p.x===p.correctX && p.y===p.correctY)){
        alert('🎉 Congratulations! You completed the puzzle! 🎉');
    }
}
</script>

</body>
</html>
