<!DOCTYPE html>
<html>
<head>
    <title>Valentine Puzzle</title>
    <style>
        body {
            margin: 0;
            text-align: center;
            background: linear-gradient(135deg, #f8e1e7, #f3c6d3);
            font-family: "Georgia", serif;
            overflow: hidden;
        }

        h1 {
            margin-top: 30px;
            font-size: 40px;
            color: #7a2c45;
            letter-spacing: 2px;
        }

        .puzzle-container {
            width: 480px;
            height: 480px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 3px solid #c9a227;
            box-shadow: 0 0 25px rgba(0,0,0,0.15);
        }

        .piece {
            width: 60px;
            height: 60px;
            background-image: url("puzzle.jpg");
            background-size: 480px 480px;
            border: 1px solid rgba(255,255,255,0.6);
            cursor: pointer;
        }

        button {
            padding: 10px 24px;
            font-size: 16px;
            background: #7a2c45;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 8px;
            transition: 0.3s;
        }

        button:hover {
            background: #5e1f34;
        }

        #popup {
            opacity: 0;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            font-size: 32px;
            color: #7a2c45;
            box-shadow: 0 0 40px rgba(0,0,0,0.2);
            transition: opacity 1.5s ease;
            z-index: 1000;
        }

        .confetti {
            position: fixed;
            width: 6px;
            height: 6px;
            background: gold;
            animation: fall 4s linear forwards;
        }

        @keyframes fall {
            from { transform: translateY(-10vh); opacity: 1; }
            to { transform: translateY(100vh); opacity: 0; }
        }
    </style>
</head>

<body>

<h1>Happy Valentine’s Day</h1>

<div class="puzzle-container" id="puzzle"></div>

<button onclick="shuffle()">Shuffle</button>
<button onclick="restartPuzzle()">Restart</button>

<div id="popup">I Love You Muffin ❤️</div>

<script>
    const size = 8;
    const puzzle = document.getElementById("puzzle");
    const popup = document.getElementById("popup");
    let pieces = [];
    let selectedPiece = null;

    function createPuzzle() {
        puzzle.innerHTML = "";
        pieces = [];

        for (let row = 0; row < size; row++) {
            for (let col = 0; col < size; col++) {
                const piece = document.createElement("div");
                piece.classList.add("piece");
                piece.style.backgroundPosition = `-${col * 60}px -${row * 60}px`;
                piece.dataset.correct = row * size + col;
                piece.addEventListener("click", () => selectPiece(piece));
                pieces.push(piece);
                puzzle.appendChild(piece);
            }
        }
    }

    function selectPiece(piece) {
        if (!selectedPiece) {
            selectedPiece = piece;
            piece.style.border = "2px solid #c9a227";
        } else {
            swapPieces(selectedPiece, piece);
            selectedPiece.style.border = "1px solid rgba(255,255,255,0.6)";
            selectedPiece = null;
            checkWin();
        }
    }

    function swapPieces(p1, p2) {
        const temp = p1.style.backgroundPosition;
        p1.style.backgroundPosition = p2.style.backgroundPosition;
        p2.style.backgroundPosition = temp;
    }

    function shuffle() {
        for (let i = pieces.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            swapPieces(pieces[i], pieces[j]);
        }
        popup.style.opacity = "0";
    }

    function checkWin() {
        let correct = true;
        pieces.forEach((piece, index) => {
            if (piece.dataset.correct != index) {
                correct = false;
            }
        });

        if (correct) {
            popup.style.opacity = "1";
            launchConfetti();
        }
    }

    function restartPuzzle() {
        createPuzzle();
        shuffle();
    }

    function launchConfetti() {
        for (let i = 0; i < 80; i++) {
            const confetti = document.createElement("div");
            confetti.classList.add("confetti");
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.animationDuration =
                (Math.random() * 2 + 2) + "s";
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }
    }

    createPuzzle();
    shuffle();
</script>

</body>
</html>
