<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valentine</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f8e1e7, #f3cfd6);
    font-family: 'Georgia', serif;
    overflow: hidden;
}

/* Soft floating hearts */
body::before {
    content: "❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤";
    position: absolute;
    font-size: 40px;
    opacity: 0.05;
    width: 200%;
    animation: float 25s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-100vh); }
}

.container {
    text-align: center;
    z-index: 2;
}

h1 {
    color: #7b2d3b;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

#puzzle {
    width: 70vmin;
    height: 84vmin; /* 5x6 ratio */
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(6, 1fr);
    margin: auto;
    border: 4px solid #7b2d3b;
    background: white;
}

.piece {
    background-image: url("puzzle.jpg");
    background-size: 500% 600%;
    cursor: grab;
}

.buttons {
    margin-top: 20px;
}

button {
    background: #7b2d3b;
    color: white;
    border: none;
    padding: 10px 22px;
    margin: 5px;
    border-radius: 25px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5e1f2a;
}

#popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 40px;
    border-radius: 15px;
    font-size: 26px;
    color: #7b2d3b;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Valentine’s Day</h1>
    <div id="puzzle"></div>

    <div class="buttons">
        <button onclick="shuffle()">Shuffle</button>
        <button onclick="restart()">Restart</button>
    </div>
</div>

<div id="popup">
    <div class="popup-content">
        I Love You Muffin ❤️
    </div>
</div>

<script>
const puzzle = document.getElementById("puzzle");
let pieces = [];
let dragged = null;

const cols = 5;
const rows = 6;
const total = cols * rows;

function createPuzzle() {
    puzzle.innerHTML = "";
    pieces = [];

    for (let i = 0; i < total; i++) {
        const piece = document.createElement("div");
        piece.classList.add("piece");
        piece.draggable = true;

        const x = i % cols;
        const y = Math.floor(i / cols);

        piece.style.backgroundPosition = `${(x * 100)/(cols-1)}% ${(y * 100)/(rows-1)}%`;
        piece.dataset.correct = piece.style.backgroundPosition;

        piece.addEventListener("dragstart", dragStart);
        piece.addEventListener("dragover", dragOver);
        piece.addEventListener("drop", drop);

        pieces.push(piece);
        puzzle.appendChild(piece);
    }

    shuffle(); // 🔥 Shuffle automatically on load
}

function dragStart(e) {
    dragged = e.target;
}

function dragOver(e) {
    e.preventDefault();
}

function drop(e) {
    if (dragged === e.target) return;

    let temp = dragged.style.backgroundPosition;
    dragged.style.backgroundPosition = e.target.style.backgroundPosition;
    e.target.style.backgroundPosition = temp;

    checkWin();
}

function shuffle() {
    pieces.forEach(piece => {
        const randX = Math.floor(Math.random() * cols);
        const randY = Math.floor(Math.random() * rows);
        piece.style.backgroundPosition =
            `${(randX * 100)/(cols-1)}% ${(randY * 100)/(rows-1)}%`;
    });
}

function restart() {
    createPuzzle();
}

function checkWin() {
    let correct = true;

    pieces.forEach(piece => {
        if (piece.style.backgroundPosition !== piece.dataset.correct) {
            correct = false;
        }
    });

    if (correct) {
        document.getElementById("popup").style.display = "flex";
    }
}

createPuzzle();
</script>

</body>
</html>
