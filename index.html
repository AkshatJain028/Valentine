<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Valentine's Day ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background: linear-gradient(#ffd6e7, #ffb6d9);
}

h1 {
  font-family: 'Pacifico', cursive;
  font-size: 48px;
  color: #d63384;
  margin-top: 30px;
}

.subtitle {
  font-size: 20px;
  margin-bottom: 10px;
  color: #a61e4d;
}

.status {
  font-weight: 600;
  color: #ff4d6d;
  font-size: 22px;
  margin-bottom: 15px;
}

.puzzle-container {
  width: 360px;
  height: 360px;
  margin: 20px auto;
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.tile {
  width: 120px;
  height: 120px;
  position: absolute;
  background-image: url('images/puzzle.jpg');
  background-size: 360px 360px;
  cursor: pointer;
  box-sizing: border-box;
  border: 1px solid #fff;
  transition: all 0.2s ease;
}

.empty {
  background: white;
  cursor: default;
  border: none;
}

button {
  background: linear-gradient(45deg, #ff4d6d, #ff85a2);
  border: none;
  padding: 12px 28px;
  border-radius: 30px;
  font-size: 18px;
  color: white;
  cursor: pointer;
  margin: 20px;
}

button:hover {
  transform: scale(1.08);
}

.bottom-section {
  background: linear-gradient(#ff9ec4, #ff85a2);
  padding: 40px 20px;
  color: white;
  font-family: 'Pacifico', cursive;
  font-size: 30px;
}
</style>
</head>
<body>

<h1>Happy Valentine's Day ❤️</h1>
<div class="subtitle">Welcome to Our Love Story!</div>
<div class="status">Solve the Puzzle 💖</div>

<div class="puzzle-container" id="puzzle"></div>

<button onclick="shuffle()">Shuffle Puzzle</button>

<div class="bottom-section">
  Forever & Always 💖
  <p style="font-family:Poppins; font-size:18px;">With You, My Heart is Home</p>
</div>

<script>
const puzzle = document.getElementById('puzzle');
const size = 3;
const tileSize = 120;
let tiles = [];
let emptyPos = {x: size-1, y: size-1};

function createPuzzle() {
  tiles = [];
  puzzle.innerHTML = '';

  for(let row=0; row<size; row++){
    for(let col=0; col<size; col++){
      if(row === size-1 && col === size-1) continue; // skip last tile

      const tile = document.createElement('div');
      tile.classList.add('tile');
      tile.style.left = `${col*tileSize}px`;
      tile.style.top = `${row*tileSize}px`;
      tile.style.backgroundPosition = `-${col*tileSize}px -${row*tileSize}px`;

      tile.dataset.row = row;
      tile.dataset.col = col;

      tile.addEventListener('click', ()=> moveTile(tile));

      puzzle.appendChild(tile);
      tiles.push(tile);
    }
  }
}

function moveTile(tile) {
  const tileRow = parseInt(tile.dataset.row);
  const tileCol = parseInt(tile.dataset.col);

  // check if adjacent to empty
  if((tileRow === emptyPos.y && Math.abs(tileCol - emptyPos.x)===1) ||
     (tileCol === emptyPos.x && Math.abs(tileRow - emptyPos.y)===1)) {

    const tempLeft = tile.style.left;
    const tempTop = tile.style.top;

    tile.style.left = `${emptyPos.x*tileSize}px`;
    tile.style.top = `${emptyPos.y*tileSize}px`;

    emptyPos.x = tileCol;
    emptyPos.y = tileRow;
  }
}

function shuffle() {
  for(let i=0; i<100; i++){
    const movable = tiles.filter(t=>{
      const r = parseInt(t.dataset.row);
      const c = parseInt(t.dataset.col);
      return (r === emptyPos.y && Math.abs(c-emptyPos.x)===1) || (c===emptyPos.x && Math.abs(r-emptyPos.y)===1);
    });
    const tile = movable[Math.floor(Math.random()*movable.length)];
    moveTile(tile);
  }
}

createPuzzle();
</script>

</body>
</html>
