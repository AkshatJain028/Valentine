<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valentine</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f4d6dc, #e8c3cb);
    font-family: 'Georgia', serif;
}

.container {
    text-align: center;
}

h1 {
    color: #7b2d3b;
    margin-bottom: 20px;
}

#puzzle {
    width: 80vmin;
    height: 80vmin;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    margin: auto;
    border: 4px solid #7b2d3b;
}

.piece {
    background-image: url("puzzle.jpg");
    background-size: 800% 800%;
    cursor: grab;
}

.buttons {
    margin-top: 20px;
}

button {
    background: #7b2d3b;
    color: white;
    border: none;
    padding: 10px 20px;
    margin: 5px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
}

button:hover {
    background: #5e1f2a;
}

#popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 30px;
    border-radius: 10px;
    font-size: 24px;
    color: #7b2d3b;
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Valentine’s Day</h1>
    <div id="puzzle"></div>

    <div class="buttons">
        <button onclick="shuffle()">Shuffle</button>
        <button onclick="restart()">Restart</button>
    </div>
</div>

<div id="popup">
    <div class="popup-content">
        I Love You Muffin ❤️
    </div>
</div>

<script>
const puzzle = document.getElementById("puzzle");
let pieces = [];
let dragged = null;

function createPuzzle() {
    puzzle.innerHTML = "";
    pieces = [];

    for (let i = 0; i < 64; i++) {
        const piece = document.createElement("div");
        piece.classList.add("piece");
        piece.draggable = true;

        const x = i % 8;
        const y = Math.floor(i / 8);

        piece.style.backgroundPosition = `${x * 100/7}% ${y * 100/7}%`;
        piece.dataset.index = i;

        piece.addEventListener("dragstart", dragStart);
        piece.addEventListener("dragover", dragOver);
        piece.addEventListener("drop", drop);

        pieces.push(piece);
        puzzle.appendChild(piece);
    }
}

function dragStart(e) {
    dragged = e.target;
}

function dragOver(e) {
    e.preventDefault();
}

function drop(e) {
    if (dragged === e.target) return;

    let temp = dragged.style.backgroundPosition;
    dragged.style.backgroundPosition = e.target.style.backgroundPosition;
    e.target.style.backgroundPosition = temp;

    checkWin();
}

function shuffle() {
    pieces.forEach(piece => {
        const randX = Math.floor(Math.random() * 8);
        const randY = Math.floor(Math.random() * 8);
        piece.style.backgroundPosition = `${randX * 100/7}% ${randY * 100/7}%`;
    });
}

function restart() {
    createPuzzle();
}

function checkWin() {
    let correct = true;

    pieces.forEach((piece, i) => {
        const x = i % 8;
        const y = Math.floor(i / 8);
        const correctPos = `${x * 100/7}% ${y * 100/7}%`;

        if (piece.style.backgroundPosition !== correctPos) {
            correct = false;
        }
    });

    if (correct) {
        document.getElementById("popup").style.display = "flex";
    }
}

createPuzzle();
</script>

</body>
</html>
