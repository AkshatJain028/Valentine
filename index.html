<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Valentine's Day ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background: linear-gradient(#ffd6e7, #ffb6d9);
}

h1 {
  font-family: 'Pacifico', cursive;
  font-size: 48px;
  color: #d63384;
  margin-top: 30px;
}

.subtitle {
  font-size: 20px;
  margin-bottom: 10px;
  color: #a61e4d;
}

.status {
  font-weight: 600;
  color: #ff4d6d;
  font-size: 22px;
  margin-bottom: 15px;
}

.puzzle-container {
  width: 360px;
  height: 360px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 2px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.tile {
  background-size: 360px 360px;
  cursor: pointer;
}

.empty {
  background: white;
  cursor: default;
}

button {
  background: linear-gradient(45deg, #ff4d6d, #ff85a2);
  border: none;
  padding: 12px 28px;
  border-radius: 30px;
  font-size: 18px;
  color: white;
  cursor: pointer;
  margin: 20px;
}

button:hover {
  transform: scale(1.08);
}

.bottom-section {
  background: linear-gradient(#ff9ec4, #ff85a2);
  padding: 40px 20px;
  color: white;
  font-family: 'Pacifico', cursive;
  font-size: 30px;
}
</style>
</head>

<body>

<h1>Happy Valentine's Day ❤️</h1>
<div class="subtitle">Welcome to Our Love Story!</div>
<div class="status">Solve the Puzzle 💖</div>

<div class="puzzle-container" id="puzzle"></div>

<button onclick="shuffle()">Shuffle Puzzle</button>

<div class="bottom-section">
  Forever & Always 💖
  <p style="font-family:Poppins; font-size:18px;">With You, My Heart is Home</p>
</div>

<script>
const puzzle = document.getElementById("puzzle");
const size = 3;
let tiles = [];

function createPuzzle() {
  puzzle.innerHTML = "";
  tiles = [];

  for (let i = 0; i < size * size; i++) {
    const tile = document.createElement("div");
    tile.classList.add("tile");

    if (i === size * size - 1) {
      tile.classList.add("empty");
    } else {
      const row = Math.floor(i / size);
      const col = i % size;
      tile.style.backgroundImage = "url('images/your-image.jpg')";
      tile.style.backgroundPosition = `-${col * 120}px -${row * 120}px`;
      tile.addEventListener("click", () => moveTile(i));
    }

    tiles.push(tile);
    puzzle.appendChild(tile);
  }
}

function moveTile(index) {
  const emptyIndex = tiles.findIndex(t => t.classList.contains("empty"));
  const validMoves = [
    emptyIndex - 1,
    emptyIndex + 1,
    emptyIndex - size,
    emptyIndex + size
  ];

  if (validMoves.includes(index)) {
    puzzle.insertBefore(tiles[index], tiles[emptyIndex]);
    tiles.splice(emptyIndex, 1);
    tiles.splice(index, 0, document.querySelector(".empty"));
  }
}

function shuffle() {
  for (let i = 0; i < 100; i++) {
    const rand = Math.floor(Math.random() * tiles.length);
    moveTile(rand);
  }
}

createPuzzle();
</script>

</body>
</html>
