<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valentine</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #f8e1e7, #f3cfd6);
    font-family: 'Georgia', serif;
    overflow: hidden;
}

/* HEADER */
.header {
    text-align: center;
    padding-top: 25px;
}

.header h1 {
    font-size: 44px;
    color: #7b2d3b;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

/* Floating Stickers */
.sticker {
    position: absolute;
    font-size: 28px;
    opacity: 0.8;
}

.sticker1 { top: 20px; left: 20px; }
.sticker2 { top: 60px; right: 30px; }
.sticker3 { top: 140px; left: 40px; }
.sticker4 { top: 120px; right: 50px; }
.sticker5 { bottom: 120px; left: 30px; }
.sticker6 { bottom: 140px; right: 40px; }

/* MAIN */
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

#puzzle {
    width: 70vmin;
    height: 84vmin;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(6, 1fr);
    border: 4px solid #7b2d3b;
    background: white;
}

/* Puzzle pieces */
.piece {
    background-image: url("puzzle.jpg");
    background-size: 500% 600%;
    cursor: grab;
}

/* Footer */
.footer {
    text-align: center;
    padding: 15px;
}

button {
    padding: 12px 30px;
    font-size: 16px;
    background: #7b2d3b;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

button:hover {
    background: #5e1f2a;
}

/* Popup */
#popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 40px;
    border-radius: 15px;
    font-size: 28px;
    color: #7b2d3b;
}
</style>
</head>

<body>

<div class="header">
    <h1>Happy Valentine’s Day</h1>
</div>

<!-- Stickers -->
<div class="sticker sticker1">❤️</div>
<div class="sticker sticker2">🍫</div>
<div class="sticker sticker3">🧸</div>
<div class="sticker sticker4">🌹</div>
<div class="sticker sticker5">💝</div>
<div class="sticker sticker6">💖</div>

<div class="main">
    <div id="puzzle"></div>
</div>

<div class="footer">
    <button onclick="shuffle()">Shuffle</button>
</div>

<div id="popup">
    <div class="popup-content">
        I Love You Muffin ❤️
    </div>
</div>

<script>
const puzzle = document.getElementById("puzzle");
let pieces = [];
let dragged = null;

const cols = 5;
const rows = 6;
const total = cols * rows;

/* Create puzzle correctly */
function createPuzzle() {
    puzzle.innerHTML = "";
    pieces = [];

    for (let i = 0; i < total; i++) {
        const piece = document.createElement("div");
        piece.classList.add("piece");
        piece.draggable = true;

        const x = i % cols;
        const y = Math.floor(i / cols);

        const position =
            `${(x * 100)/(cols-1)}% ${(y * 100)/(rows-1)}%`;

        piece.style.backgroundPosition = position;
        piece.dataset.correct = position;

        piece.addEventListener("dragstart", dragStart);
        piece.addEventListener("dragover", dragOver);
        piece.addEventListener("drop", drop);

        pieces.push(piece);
        puzzle.appendChild(piece);
    }

    shuffle();
}

/* Proper shuffle (no duplicates) */
function shuffle() {
    const positions = pieces.map(p => p.dataset.correct);

    for (let i = positions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [positions[i], positions[j]] = [positions[j], positions[i]];
    }

    pieces.forEach((piece, index) => {
        piece.style.backgroundPosition = positions[index];
    });
}

function dragStart(e) {
    dragged = e.target;
}

function dragOver(e) {
    e.preventDefault();
}

function drop(e) {
    if (dragged === e.target) return;

    let temp = dragged.style.backgroundPosition;
    dragged.style.backgroundPosition = e.target.style.backgroundPosition;
    e.target.style.backgroundPosition = temp;

    checkWin();
}

function checkWin() {
    let correct = pieces.every(piece =>
        piece.style.backgroundPosition === piece.dataset.correct
    );

    if (correct) {
        document.getElementById("popup").style.display = "flex";
    }
}

createPuzzle();
</script>

</body>
</html>
