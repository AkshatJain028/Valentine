<!DOCTYPE html>
<html>
<head>
    <title>Valentine Puzzle ❤️</title>
    <style>
        body {
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: white;
            font-size: 36px;
            margin-top: 20px;
        }

        .puzzle-container {
            width: 480px;
            height: 480px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 4px solid white;
            box-shadow: 0 0 25px #ff4d6d;
        }

        .piece {
            width: 60px;
            height: 60px;
            background-image: url("puzzle.jpg");
            background-size: 480px 480px;
            cursor: pointer;
            border: 1px solid white;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #ff4d6d;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #e63950;
        }

        .heart {
            position: absolute;
            color: white;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            from { transform: translateY(100vh); opacity: 1; }
            to { transform: translateY(-10vh); opacity: 0; }
        }

        #message {
            color: white;
            font-size: 24px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>❤️ Happy Valentine’s Day ❤️</h1>

<div class="puzzle-container" id="puzzle"></div>

<button onclick="shuffle()">Shuffle</button>
<button onclick="restartPuzzle()">Restart New Puzzle</button>

<div id="message"></div>

<script>
    const size = 8;
    const puzzle = document.getElementById("puzzle");
    const message = document.getElementById("message");
    let pieces = [];
    let selectedPiece = null;

    function createPuzzle() {
        puzzle.innerHTML = "";
        pieces = [];

        for (let row = 0; row < size; row++) {
            for (let col = 0; col < size; col++) {
                const piece = document.createElement("div");
                piece.classList.add("piece");
                piece.style.backgroundPosition = `-${col * 60}px -${row * 60}px`;
                piece.dataset.correct = row * size + col;
                piece.addEventListener("click", () => selectPiece(piece));
                pieces.push(piece);
                puzzle.appendChild(piece);
            }
        }
    }

    function selectPiece(piece) {
        if (!selectedPiece) {
            selectedPiece = piece;
            piece.style.border = "2px solid red";
        } else {
            swapPieces(selectedPiece, piece);
            selectedPiece.style.border = "1px solid white";
            selectedPiece = null;
            checkWin();
        }
    }

    function swapPieces(p1, p2) {
        const temp = p1.style.backgroundPosition;
        p1.style.backgroundPosition = p2.style.backgroundPosition;
        p2.style.backgroundPosition = temp;
    }

    function shuffle() {
        for (let i = pieces.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            swapPieces(pieces[i], pieces[j]);
        }
        message.innerHTML = "";
    }

    function checkWin() {
        let correct = true;
        pieces.forEach((piece, index) => {
            if (piece.dataset.correct != index) {
                correct = false;
            }
        });

        if (correct) {
            message.innerHTML = "💖 You Solved It! 💖";
        }
    }

    function restartPuzzle() {
        createPuzzle();
        shuffle();
        message.innerHTML = "";
    }

    function createHearts() {
        setInterval(() => {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * window.innerWidth + "px";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }, 500);
    }

    createPuzzle();
    shuffle();
    createHearts();
</script>

</body>
</html>
