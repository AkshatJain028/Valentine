<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valentine</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #f8e1e7, #f3cfd6);
    font-family: 'Georgia', serif;
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px 10px 10px 10px;
}

.header h1 {
    font-size: 42px;
    color: #7b2d3b;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

/* Romantic GIF Row */
.gif-row {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.gif-row img {
    width: 60px;
    height: 60px;
}

/* PUZZLE AREA */
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

#puzzle {
    width: 70vmin;
    height: 84vmin;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(6, 1fr);
    border: 4px solid #7b2d3b;
    background: white;
}

.piece {
    background-image: url("puzzle.jpg");
    background-size: 500% 600%;
    cursor: grab;
}

/* FOOTER BUTTON */
.footer {
    padding: 20px;
}

button {
    width: 100%;
    padding: 20px;
    font-size: 18px;
    background: #7b2d3b;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
}

button:hover {
    background: #5e1f2a;
}

/* POPUP */
#popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 40px;
    border-radius: 15px;
    font-size: 28px;
    color: #7b2d3b;
}
</style>
</head>

<body>

<div class="header">
    <h1>Happy Valentine’s Day</h1>
    <div class="gif-row">
        <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">
        <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
        <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">
    </div>
</div>

<div class="main">
    <div id="puzzle"></div>
</div>

<div class="footer">
    <button onclick="shuffle()">Shuffle Puzzle</button>
</div>

<div id="popup">
    <div class="popup-content">
        I Love You Muffin ❤️
    </div>
</div>

<script>
const puzzle = document.getElementById("puzzle");
let pieces = [];
let dragged = null;

const cols = 5;
const rows = 6;
const total = cols * rows;

function createPuzzle() {
    puzzle.innerHTML = "";
    pieces = [];

    for (let i = 0; i < total; i++) {
        const piece = document.createElement("div");
        piece.classList.add("piece");
        piece.draggable = true;

        const x = i % cols;
        const y = Math.floor(i / cols);

        piece.style.backgroundPosition =
            `${(x * 100)/(cols-1)}% ${(y * 100)/(rows-1)}%`;

        piece.dataset.correct = piece.style.backgroundPosition;

        piece.addEventListener("dragstart", dragStart);
        piece.addEventListener("dragover", dragOver);
        piece.addEventListener("drop", drop);

        pieces.push(piece);
        puzzle.appendChild(piece);
    }

    shuffle();
}

function dragStart(e) {
    dragged = e.target;
}

function dragOver(e) {
    e.preventDefault();
}

function drop(e) {
    if (dragged === e.target) return;

    let temp = dragged.style.backgroundPosition;
    dragged.style.backgroundPosition = e.target.style.backgroundPosition;
    e.target.style.backgroundPosition = temp;

    checkWin();
}

function shuffle() {
    pieces.forEach(piece => {
        const randX = Math.floor(Math.random() * cols);
        const randY = Math.floor(Math.random() * rows);
        piece.style.backgroundPosition =
            `${(randX * 100)/(cols-1)}% ${(randY * 100)/(rows-1)}%`;
    });
}

function checkWin() {
    let correct = true;

    pieces.forEach(piece => {
        if (piece.style.backgroundPosition !== piece.dataset.correct) {
            correct = false;
        }
    });

    if (correct) {
        document.getElementById("popup").style.display = "flex";
    }
}

createPuzzle();
</script>

</body>
</html>
