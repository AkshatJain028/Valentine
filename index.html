<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valentine</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: #f8cfd6;
    text-align: center;
    overflow-x: hidden;
}

/* Top Romantic Banner */
.banner {
    padding: 30px 10px 10px;
    background: linear-gradient(to bottom, #f6a9b8, #f8cfd6);
    color: white;
}

.banner h1 {
    font-size: 48px;
    margin: 0;
}

.subtitle {
    font-size: 22px;
    margin-top: 10px;
}

/* Puzzle Section */
.puzzle-wrapper {
    padding: 20px;
}

#puzzle {
    margin: 20px auto;
    width: 70vmin;
    height: 84vmin;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(6, 1fr);
    border: 6px solid #ffffffaa;
    border-radius: 15px;
    background: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.piece {
    background-image: url("puzzle.jpg");
    background-size: 500% 600%;
    cursor: grab;
}

/* Bottom Message Section */
.message-section {
    padding: 20px 10px 40px;
}

.big-message {
    font-size: 40px;
    color: #b03060;
    margin-bottom: 10px;
}

.small-sub {
    font-size: 20px;
    margin-bottom: 20px;
    color: #7b2d3b;
}

button {
    padding: 15px 40px;
    font-size: 20px;
    background: #d64f6a;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

button:hover {
    background: #b03060;
}

/* Popup */
#popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 50px;
    border-radius: 20px;
    font-size: 30px;
    color: #b03060;
}
</style>
</head>

<body>

<div class="banner">
    <h1>Srishti ❤️</h1>
    <div class="subtitle">Welcome to Our Love Story!</div>
</div>

<div class="puzzle-wrapper">
    <div id="puzzle"></div>
</div>

<div class="message-section">
    <div class="big-message">You Complete Me!</div>
    <div class="small-sub">Our Sweet Jigsaw Moment</div>
    <button onclick="shuffle()">Shuffle Puzzle</button>
</div>

<div id="popup">
    <div class="popup-content">
        I Love You Muffin ❤️
    </div>
</div>

<script>
const puzzle = document.getElementById("puzzle");
let pieces = [];
let dragged = null;

const cols = 5;
const rows = 6;
const total = cols * rows;

function createPuzzle() {
    puzzle.innerHTML = "";
    pieces = [];

    for (let i = 0; i < total; i++) {
        const piece = document.createElement("div");
        piece.classList.add("piece");
        piece.draggable = true;

        const x = i % cols;
        const y = Math.floor(i / cols);

        const position =
            `${(x * 100)/(cols-1)}% ${(y * 100)/(rows-1)}%`;

        piece.style.backgroundPosition = position;
        piece.dataset.correct = position;

        piece.addEventListener("dragstart", dragStart);
        piece.addEventListener("dragover", dragOver);
        piece.addEventListener("drop", drop);

        pieces.push(piece);
        puzzle.appendChild(piece);
    }

    shuffle();
}

function shuffle() {
    const positions = pieces.map(p => p.dataset.correct);

    for (let i = positions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [positions[i], positions[j]] = [positions[j], positions[i]];
    }

    pieces.forEach((piece, index) => {
        piece.style.backgroundPosition = positions[index];
    });
}

function dragStart(e) {
    dragged = e.target;
}

function dragOver(e) {
    e.preventDefault();
}

function drop(e) {
    if (dragged === e.target) return;

    let temp = dragged.style.backgroundPosition;
    dragged.style.backgroundPosition = e.target.style.backgroundPosition;
    e.target.style.backgroundPosition = temp;

    checkWin();
}

function checkWin() {
    let correct = pieces.every(piece =>
        piece.style.backgroundPosition === piece.dataset.correct
    );

    if (correct) {
        document.getElementById("popup").style.display = "flex";
        confetti({
            particleCount: 200,
            spread: 120,
            origin: { y: 0.6 }
        });
    }
}

createPuzzle();
</script>

</body>
</html>
